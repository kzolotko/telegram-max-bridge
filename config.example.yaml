# Telegram ↔ MAX Bridge Configuration
# Uses real user accounts (not bots) on both sides.

# Telegram API credentials (get from https://my.telegram.org)
api_id: 12345678
api_hash: "0123456789abcdef0123456789abcdef"

# Session names for listener accounts.
# These accounts must be members of ALL chats listed in chat_pairs.
# Sessions are created by running: python -m src.auth
listener_telegram_session: "tg_listener"
listener_max_session: "max_listener"

# Directory for session files
sessions_dir: "sessions"

# Pairs of chats to bridge (bidirectional)
chat_pairs:
  - name: "team-general"
    telegram_chat_id: -1001234567890   # TG chat/supergroup ID
    max_chat_id: -68093732121255       # MAX chat ID

  # Add more pairs:
  # - name: "team-dev"
  #   telegram_chat_id: -1009876543210
  #   max_chat_id: -68093732654321

# User mappings (up to 10)
# Each user authenticates their real accounts in both messengers.
# When user sends a message in TG, their MAX account sends the mirror.
users:
  - name: "Alice"
    telegram_user_id: 111111111        # TG numeric user ID
    max_user_id: 175123456789          # MAX numeric user ID
    telegram_session: "tg_alice"       # Pyrogram session name
    max_session: "max_alice"           # MAX session name

  - name: "Bob"
    telegram_user_id: 333333333
    max_user_id: 175987654321
    telegram_session: "tg_bob"
    max_session: "max_bob"
