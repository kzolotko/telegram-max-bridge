# Telegram ↔ MAX Bridge — Example Configuration
#
# Copy to config.yaml and fill in your values:
#   cp config.example.yaml config.yaml
#
# Then authenticate accounts:
#   python -m src.auth
#
# Then run:
#   python -m src

# ─── Telegram API credentials ─────────────────────────────────────────────────
# Get from: https://my.telegram.org → API development tools
# One application is shared by all user accounts in this config.
api_id: 12345678
api_hash: "0123456789abcdef0123456789abcdef"

# ─── Session storage ──────────────────────────────────────────────────────────
# Directory for session files (relative to project root).
# Session filenames are derived automatically from user.name:
#   Telegram → sessions/tg_{user.name}.session
#   MAX      → sessions/max_{user.name}.max_session
sessions_dir: "sessions"

# ─── Bridge entries ────────────────────────────────────────────────────────────
# Each entry connects one Telegram chat ↔ one MAX chat via one user's accounts.
#
# HOW MULTI-USER WORKS
# ─────────────────────
# When multiple users share the same chat pair, only the FIRST user listed
# (the "primary") actively listens.  The bridge routes each message to the
# correct sender's account on the other side:
#
#   • Alice writes in TG → mirrors via Alice's MAX account (no prefix)
#   • Bob writes in TG   → mirrors via Bob's MAX account   (no prefix)
#   • Charlie writes in TG (not configured) → mirrors via primary's MAX
#     account with "[Charlie]: " prefix
#
# Every message is forwarded exactly once — no duplicates.
#
# HOW TO FIND IDs
# ───────────────
#   telegram_chat_id  — forward any message from the group to @userinfobot;
#                       it replies with the chat ID (negative number).
#                       Supergroups start with -100, regular groups don't.
#
#   max_chat_id       — open the chat at https://web.max.ru, the ID is in
#                       the URL: web.max.ru/#/chats/@chat/-72099589405396
#
#   telegram_user_id  — message @userinfobot directly, it replies with your ID.
#
#   max_user_id       — shown in `python -m src.auth` output after MAX login,
#                       or find viewerId in browser dev tools at web.max.ru.
#
# user.name must be alphanumeric — it is used to build session filenames
# (e.g. tg_alice.session, max_alice.max_session).

bridges:
  # ── Minimal: one chat, one user ──────────────────────────────────────────────
  - name: "team-general"              # unique key (for logs & message store)
    telegram_chat_id: -1001234567890  # Telegram group/supergroup ID
    max_chat_id: -72099000000001      # MAX chat ID
    user:
      name: "alice"                   # alphanumeric, used in session filenames
      telegram_user_id: 111111111     # numeric Telegram user ID
      max_user_id: 205111111          # numeric MAX user ID

  # ── Same user, additional chat ───────────────────────────────────────────────
  # Alice also bridges this second chat pair.
  # Session files are reused — no extra authentication needed.
  - name: "team-dev"
    telegram_chat_id: -1009876543210
    max_chat_id: -72099000000002
    user:
      name: "alice"
      telegram_user_id: 111111111
      max_user_id: 205111111

  # ── Second user for the same chat (authorship-preserving) ────────────────────
  # Alice is primary (listed first) — her accounts listen to the chat.
  # When Bob writes in TG, the bridge sends via Bob's MAX account directly
  # (no "[Bob]: " prefix — the message appears from Bob's name natively).
  # When someone not listed writes, it goes through Alice's account with prefix.
  - name: "team-general"
    telegram_chat_id: -1001234567890
    max_chat_id: -72099000000001
    user:
      name: "bob"
      telegram_user_id: 333333333
      max_user_id: 205333333
