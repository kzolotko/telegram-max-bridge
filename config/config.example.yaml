# Telegram ↔ MAX Bridge — Chat Configuration
#
# Prerequisites:
#   1. Set up credentials first:  ./bridge.sh setup credentials
#   2. Then configure users:      ./bridge.sh setup users
#   3. Then configure bridges:    ./bridge.sh setup bridges
#   Or run full wizard:           ./bridge.sh setup
#
# Note: API credentials, bot tokens, and admin settings live in credentials.yaml

# ─── User accounts ───────────────────────────────────────────────────────────
# Each user needs a Telegram and MAX account with active sessions.
# Sessions are stored in sessions/ (e.g. tg_alice.session, max_alice.max_session).
#
# HOW TO FIND IDs
# ───────────────
#   telegram_user_id  — message @userinfobot directly, it replies with your ID.
#
#   max_user_id       — shown in `./bridge.sh auth` output after MAX login,
#                       or find viewerId in browser dev tools at web.max.ru.
#
# user.name must be alphanumeric (lowercase) — it is used to build session
# filenames (e.g. tg_alice.session, max_alice.max_session).

users:
  - name: "alice"
    telegram_user_id: 111111111
    max_user_id: 205111111

  - name: "bob"
    telegram_user_id: 333333333
    max_user_id: 205333333

# ─── Bridge entries ──────────────────────────────────────────────────────────
# Each bridge connects one Telegram chat ↔ one MAX chat.
# The users list references users from the section above (first = primary).
#
# HOW MULTI-USER WORKS
# ─────────────────────
# When a bridge has multiple users, only the FIRST user (the "primary")
# actively listens. The bridge routes each message to the correct sender's
# account on the other side:
#
#   • Alice writes in TG → mirrors via Alice's MAX account (no prefix)
#   • Bob writes in TG   → mirrors via Bob's MAX account   (no prefix)
#   • Charlie writes in TG (not configured) → mirrors via primary's MAX
#     account with "[Charlie]: " prefix
#
# Every message is forwarded exactly once — no duplicates.
#
# HOW TO FIND CHAT IDs
# ────────────────────
#   telegram_chat_id  — forward any message from the group to @userinfobot;
#                       it replies with the chat ID (negative number).
#                       Supergroups start with -100, regular groups don't.
#
#   max_chat_id       — open the chat at https://web.max.ru, the ID is in
#                       the URL: web.max.ru/#/chats/@chat/-72099589405396

bridges:
  # ── Minimal: one chat, one user ────────────────────────────────────────────
  - name: "team-general"
    telegram_chat_id: -1001234567890
    max_chat_id: -72099000000001
    users: ["alice"]

  # ── Same user, additional chat ─────────────────────────────────────────────
  - name: "team-dev"
    telegram_chat_id: -1009876543210
    max_chat_id: -72099000000002
    users: ["alice"]

  # ── Multi-user bridge (authorship-preserving) ──────────────────────────────
  # Alice is primary (listed first) — her accounts listen to the chat.
  # When Bob writes in TG, the bridge sends via Bob's MAX account directly
  # (no "[Bob]: " prefix — the message appears from Bob's name natively).
  # When someone not listed writes, it goes through Alice's account with prefix.
  - name: "team-general-multiuser"
    telegram_chat_id: -1001234567890
    max_chat_id: -72099000000001
    users: ["alice", "bob"]
