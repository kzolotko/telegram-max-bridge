# Telegram API credentials
# Get from: https://my.telegram.org → API development tools
#
# Set up via wizard:
#   ./bridge.sh setup credentials
#
# Or fill in manually:
#   cp config/credentials.example.yaml config/credentials.yaml

api_id: 12345678
api_hash: "0123456789abcdef0123456789abcdef"

# ─── MAX→TG Bridge Bot (optional) ────────────────────────────────────────────
# A single bot used for:
#   1. Forwarding MAX direct messages to Telegram (DM bridge)
#   2. Forwarding group messages from non-configured MAX users to TG groups
#      (auto-detected: if the bot is a member of the TG group, it's used;
#       otherwise messages go through the primary user's account as before)
#
# Create a bot via @BotFather, paste the token below.
# For DM bridge: each user must start a chat with the bot (send /start).
# For group forwarding: add the bot to the TG groups where it should operate.
#
# max2tg_bridge_bot_token: "123456789:ABCdefGHIjklMNOpqrsTUVwxyz"

# ─── Admin Bot (optional) ────────────────────────────────────────────────────
# A separate bot for remote bridge management (status, config, logs).
# Create a SEPARATE bot via @BotFather (not the DM bridge bot).
#
# admin_bot_token: "987654321:ZYXwvuTSRqpoNMLkjihGFEdcbaZYX"
# admin_ids: [111111111]  # Telegram user IDs allowed to use admin commands
