# E2E Test Configuration
# Copy this file to e2e_config.yaml and fill in the values.
#
# Prerequisites:
#   1. Bridge is set up (credentials.yaml + config.yaml exist)
#   2. E2E TG sessions are authenticated:
#      ./bridge.sh test-auth              # primary user
#      ./bridge.sh test-auth --user mary  # second user (optional)
#   3. Bridge is RUNNING in a separate terminal:
#      ./bridge.sh start

# Primary user — must match a user in config.yaml
user_name: alice

# Second user (optional) — enables two-user tests: reactions, deletes,
# sender routing.  Must also be configured in config.yaml for the same bridge.
# Requires a separate TG E2E session: ./bridge.sh test-auth --user mary
# second_user_name: mary

# Chat pair to test against (must match a bridge in config.yaml)
tg_chat_id: -1001234567890
max_chat_id: -72099000000001

# Seconds to wait for a bridged message to arrive
timeout: 15

# DM bridge tests are auto-detected from credentials.yaml (max2tg_bridge_bot_token).
# No extra config needed here.
