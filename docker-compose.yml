services:
  bridge:
    build: .
    image: telegram-max-bridge
    container_name: telegram-max-bridge
    restart: unless-stopped

    volumes:
      # credentials.yaml — Telegram API credentials (read-only)
      - ./credentials.yaml:/app/credentials.yaml:ro
      # config.yaml — bridge configuration (read-only)
      - ./config.yaml:/app/config.yaml:ro
      # sessions/ holds Pyrogram and MAX session files — must persist across restarts
      - ./sessions:/app/sessions

    # Write logs to stdout (visible via `docker logs` or log driver)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
