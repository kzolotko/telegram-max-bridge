services:
  bridge:
    build: .
    image: telegram-max-bridge
    container_name: telegram-max-bridge
    restart: unless-stopped

    volumes:
      - ./credentials.yaml:/app/credentials.yaml:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./sessions:/app/sessions

    # Keep the container healthy: bridge logs are the health indicator.
    # A process crash → restart policy handles recovery.
    healthcheck:
      test: ["CMD", "python", "-c", "import os, sys; sys.exit(0 if os.path.exists('/app/sessions') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
