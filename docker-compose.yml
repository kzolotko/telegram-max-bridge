services:
  bridge:
    build: .
    image: telegram-max-bridge
    container_name: telegram-max-bridge
    restart: unless-stopped
    stop_grace_period: 15s
    mem_limit: 512m

    environment:
      - TZ=Europe/Moscow

    security_opt:
      - no-new-privileges:true

    volumes:
      - ./credentials.yaml:/app/credentials.yaml:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./sessions:/app/sessions

    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys,time; f='/app/sessions/.healthcheck'; sys.exit(0 if os.path.exists(f) and (time.time()-float(open(f).read().strip()))<600 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
