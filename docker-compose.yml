services:
  bridge:
    build: .
    image: telegram-max-bridge
    container_name: telegram-max-bridge
    restart: unless-stopped

    volumes:
      - ./credentials.yaml:/app/credentials.yaml:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./sessions:/app/sessions

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
